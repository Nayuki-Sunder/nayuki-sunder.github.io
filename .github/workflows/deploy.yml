name: Publish to GH Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: macos-latest 
    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0

      - name: Checkout destination
        uses: actions/checkout@v3
        if: github.ref == 'refs/heads/main'
        with:
          ref: gh-pages
          path: built-site

      - name: Install Hugo from PKG
        run: |
          # Download the PKG file
          curl -L -o /tmp/hugo.pkg 'https://github.com/gohugoio/hugo/releases/download/v0.158.0/hugo_extended_withdeploy_0.158.0_darwin-universal.pkg'
          
          # Install the PKG to the root volume
          sudo installer -pkg /tmp/hugo.pkg -target /
          
          # Verify installation
          hugo version

      - name: Build
        run: hugo --minify

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          # Clean destination first
          rm -rf ${GITHUB_WORKSPACE}/built-site/*
          # Copy new build
          cp -R public/* ${GITHUB_WORKSPACE}/built-site/
          cd ${GITHUB_WORKSPACE}/built-site
          
          # Git configuration
          git config user.name 'Nayuki-Sunder'
          git config user.email 'sereiwathnaros@chungbuk.ac.kr'
          
          # Commit and Push
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m 'Updated site via v0.158.0 PKG'
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi
